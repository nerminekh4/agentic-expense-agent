<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes de frais</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>Notes de frais</h1>
            <p>Prenez en photo votre justificatif, vérifiez les informations extraites, puis envoyez-les à la comptabilité.</p>
        </header>

        <section class="card" id="upload-card">
            <h2>1. Importer un justificatif</h2>

            <form id="upload-form"
                  hx-post="/api/analyze"
                  hx-target="#analysis-result"
                  hx-swap="innerHTML"
                  hx-encoding="multipart/form-data"
                  hx-indicator="#loading-indicator">

                <label for="file-input" class="file-drop">
                    <span id="file-label">Choisir une image ou prendre une photo</span>
                    <input type="file" id="file-input" name="file" accept="image/*" capture="environment" required>
                </label>

                <img id="preview" class="preview hidden" alt="Aperçu du justificatif">

                <button type="submit" class="btn btn-primary">Analyser le document</button>
            </form>

            <div id="loading-indicator" class="loading-indicator">
                Analyse en cours...
            </div>
        </section>

        <section class="card" id="analysis-result"></section>

        <section class="card hidden" id="confirmation-card">
            <div id="confirmation-container"></div>
            <button id="reset-btn" class="btn btn-secondary hidden">Nouvelle note de frais</button>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
